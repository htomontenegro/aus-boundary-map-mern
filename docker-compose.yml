services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/boundary_map
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_strong_secret_min_32_chars}
      PORT: 4001
      CLIENT_URL: http://localhost
    ports:
      - "4001:4001"

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  mongo_data:
